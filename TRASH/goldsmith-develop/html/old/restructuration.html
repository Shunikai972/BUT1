<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Maquette Circulaire</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#7D7D7D] min-h-screen relative overflow-hidden">

  <!-- Grand cercle bas gauche -->
  <div class="absolute" style="top:322.85px; left:80.72px;">
    <div class="w-[572px] h-[572px] rounded-full bg-[#C7C7C7] rotate-[-135deg]"></div>
  </div>

  <!-- Petit cercle dans le grand bas gauche -->
  <div class="absolute" style="top:494.68px; left:515.59px;">
    <div class="w-[138px] h-[138px] rounded-full bg-white rotate-[-135deg]"></div>
  </div>

  <!-- Grand cercle haut droit -->
  <div class="absolute" style="top:-107.78px; left:511.35px;">
    <div class="w-[572px] h-[572px] rounded-full bg-[#919191] rotate-[-135deg]"></div>
  </div>

  <!-- Petit cercle dans le grand haut droit -->
  <div class="absolute" style="top:315.07px; left:695.2px;">
    <div class="w-[138px] h-[138px] rounded-full bg-[#5A5A5A] rotate-[-135deg]"></div>
  </div>

</body>
</html>
